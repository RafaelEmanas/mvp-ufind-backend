spring:
  jpa:
    show-sql: false
  web:
    error:
      include-stacktrace: never
      include-message: never
      include-binding-errors: never

  flyway:
    baseline-on-migrate: false

logging:
  level:
    root: INFO
    "[com.ufind]": INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false