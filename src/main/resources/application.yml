spring:
  application:
    name: ufind-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ufind}
    username: ${SPRING_DATASOURCE_USERNAME:dev}
    password: ${SPRING_DATASOURCE_PASSWORD:dev}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me}
  expiration: ${JWT_EXPIRATION:86400000}
  cookie-name: ${JWT_COOKIE_NAME:token}

cloudflare:
  r2:
    endpoint: ${CLOUDFLARE_R2_ENDPOINT:http://s3.localhost.localstack.cloud:4566}
    access-key-id: ${CLOUDFLARE_R2_ACCESS_KEY_ID:test}
    secret-access-key: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:test}
    bucket-name: ${CLOUDFLARE_R2_BUCKET_NAME:ufind-dev}
    region: ${CLOUDFLARE_R2_REGION:us-east-1}

logging:
  level:
    root: ${LOG_LEVEL:INFO}