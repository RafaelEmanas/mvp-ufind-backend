spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  flyway:
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    "[com.ufind]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html