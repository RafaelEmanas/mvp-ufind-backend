services:
  app:
    build:
      context: .
      target: development
    env_file:
      - .env.dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - ./src:/app/src
      - ./target:/app/target
      - maven-repo:/root/.m2
    depends_on:
      db:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U dev -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    command: --console-enable /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  rustfs-init:
    image: amazon/aws-cli
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: us-east-1
      BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-ufind-dev}
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url=http://rustfs:9000 s3 mb s3://$$BUCKET_NAME --region us-east-1 || true;
        echo \"Bucket $$BUCKET_NAME ready\";
      "
    networks:
      - app-network

volumes:
  postgres-data-local:
  rustfs-data:
  maven-repo:

networks:
  app-network: